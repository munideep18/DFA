<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFA Simulator — Theory of Computation</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf8;
  --surface: #ffffff;
  --surface2: #f4f4f0;
  --border: #e2e2dc;
  --border2: #d0d0c8;
  --text: #1c1c1a;
  --muted: #888882;
  --accent: #2563eb;
  --accent-light: #eff6ff;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --red: #dc2626;
  --red-light: #fef2f2;
  --amber: #d97706;
  --amber-light: #fffbeb;
  --purple: #7c3aed;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
}

/* ── Layout ── */
.app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1.5rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  height: 52px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
  display: flex;
  align-items: center;
  gap: 6px;
}

.logo-badge {
  background: var(--accent);
  color: #fff;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  letter-spacing: 0.08em;
}

.topbar-divider { width: 1px; height: 20px; background: var(--border); }

.machine-tabs {
  display: flex;
  gap: 2px;
}

.tab {
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 5px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.tab:hover { background: var(--surface2); color: var(--text); }

.tab.active {
  background: var(--accent-light);
  border-color: #bfdbfe;
  color: var(--accent);
  font-weight: 500;
}

.topbar-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.unit-badge {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 3px 8px;
  border-radius: 4px;
}

/* ── Main layout ── */
.main {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 52px);
  overflow: hidden;
}

/* ── Sidebar ── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-scroll { flex: 1; overflow-y: auto; padding: 1.25rem; }
.sidebar-scroll::-webkit-scrollbar { width: 4px; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.section-head {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
  margin-top: 1.25rem;
}

.section-head:first-child { margin-top: 0; }

/* Machine description card */
.machine-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.9rem;
  margin-bottom: 1rem;
}

.machine-name {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 3px;
  color: var(--text);
}

.machine-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}

.machine-meta {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.chip {
  font-family: var(--mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--muted);
  background: var(--surface);
}

.chip.blue { background: var(--accent-light); border-color: #bfdbfe; color: var(--accent); }
.chip.green { background: var(--green-light); border-color: #bbf7d0; color: var(--green); }

/* States table */
.states-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 1rem; }

.state-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 9px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: var(--mono);
  font-size: 12px;
  transition: all 0.15s;
}

.state-row.current {
  background: var(--accent-light);
  border-color: #bfdbfe;
}

.state-row.accept-state .state-dot { background: var(--green); box-shadow: 0 0 0 2px #bbf7d0; }
.state-row.reject-current { background: var(--red-light); border-color: #fecaca; }
.state-row.accept-current { background: var(--green-light); border-color: #bbf7d0; }

.state-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border2);
  flex-shrink: 0;
}

.state-dot.start { background: var(--amber); }
.state-dot.accept { background: var(--green); }
.state-dot.start-accept { background: var(--purple); }
.state-dot.dead { background: var(--red); }

.state-name { font-weight: 500; flex: 1; }
.state-role { font-size: 10px; color: var(--muted); }

/* Transition table */
.trans-table-wrap {
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 1rem;
}

.trans-table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 11px; }
.trans-table th { padding: 6px 10px; background: var(--surface2); border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 500; text-align: left; font-size: 10px; letter-spacing: 0.06em; }
.trans-table td { padding: 5px 10px; border-bottom: 1px solid var(--border); color: var(--muted); }
.trans-table tr:last-child td { border-bottom: none; }
.trans-table tr.active-trans td { background: var(--accent-light); color: var(--text); }
.trans-table tr.active-trans td:first-child { border-left: 2px solid var(--accent); color: var(--accent); font-weight: 600; }
.trans-table td.to-accept { color: var(--green); font-weight: 500; }
.trans-table td.to-dead { color: var(--red); }

/* ── Input tester ── */
.input-area {
  padding: 1rem 1.25rem;
  border-top: 1px solid var(--border);
  background: var(--surface);
}

.input-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}

.input-label {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.input-row {
  display: flex;
  gap: 6px;
  margin-bottom: 0.6rem;
}

.str-input {
  flex: 1;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.12em;
  padding: 8px 10px;
  border: 1.5px solid var(--border2);
  border-radius: 6px;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

.str-input:focus { border-color: var(--accent); }

.btn {
  padding: 7px 14px;
  border-radius: 6px;
  border: 1.5px solid var(--border2);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--surface);
  color: var(--text);
  white-space: nowrap;
}

.btn:hover { background: var(--surface2); border-color: var(--border2); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #1d4ed8; border-color: #1d4ed8; }

.btn-green { background: var(--green); border-color: var(--green); color: #fff; }
.btn-green:hover { background: #15803d; }

.ctrl-row { display: flex; gap: 5px; flex-wrap: wrap; }

/* String tape display */
.tape-display {
  display: flex;
  gap: 3px;
  align-items: center;
  padding: 8px 0 4px;
  overflow-x: auto;
  min-height: 46px;
}

.tape-display::-webkit-scrollbar { height: 3px; }
.tape-display::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }

.tape-char {
  width: 32px;
  height: 32px;
  border: 1.5px solid var(--border);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  background: var(--surface2);
  flex-shrink: 0;
  transition: all 0.2s;
  position: relative;
}

.tape-char.read {
  background: #fff;
  color: var(--text);
  border-color: var(--border2);
}

.tape-char.current-pos {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  transform: scale(1.1);
  box-shadow: 0 2px 8px rgba(37,99,235,0.3);
}

.tape-char.done-accept {
  background: var(--green-light);
  color: var(--green);
  border-color: #bbf7d0;
}

.tape-char.done-reject {
  background: var(--red-light);
  color: var(--red);
  border-color: #fecaca;
}

.tape-char.flash { animation: charFlash 0.3s ease; }

@keyframes charFlash {
  0% { transform: scale(1.15); box-shadow: 0 0 12px rgba(37,99,235,0.4); }
  100% { }
}

.result-pill {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  display: none;
  margin-top: 6px;
  text-align: center;
}

.result-pill.accept { display: block; background: var(--green-light); color: var(--green); border: 1px solid #bbf7d0; }
.result-pill.reject { display: block; background: var(--red-light); color: var(--red); border: 1px solid #fecaca; }

/* Sample tests */
.sample-tests { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 0.5rem; }

.sample-test {
  font-family: var(--mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.12s;
  background: var(--surface);
  color: var(--muted);
}

.sample-test:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.sample-test.accept { border-color: #bbf7d0; color: var(--green); background: var(--green-light); }
.sample-test.reject { border-color: #fecaca; color: var(--red); background: var(--red-light); }

/* ── Canvas area ── */
.canvas-area {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  overflow: hidden;
}

.canvas-toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 1.25rem;
  display: flex;
  align-items: center;
  gap: 10px;
}

.canvas-title {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  flex: 1;
}

.canvas-title span { color: var(--text); font-weight: 500; }

.legend {
  display: flex;
  gap: 12px;
  align-items: center;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--muted);
}

.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  border: 1.5px solid currentColor;
}

.legend-dot.start { border-color: var(--amber); background: var(--amber-light); }
.legend-dot.accept { border-color: var(--green); background: var(--green-light); border-width: 2.5px; }
.legend-dot.dead { border-color: var(--red); background: var(--red-light); }
.legend-dot.current { border-color: var(--accent); background: var(--accent-light); border-width: 2.5px; }

.canvas-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

canvas#dfa-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* Step info overlay */
.step-info {
  position: absolute;
  bottom: 1rem;
  right: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-family: var(--mono);
  font-size: 11px;
  min-width: 200px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.step-info-row { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 3px; }
.step-info-row:last-child { margin-bottom: 0; }
.step-key { color: var(--muted); }
.step-val { color: var(--text); font-weight: 500; }
.step-val.accept { color: var(--green); }
.step-val.reject { color: var(--red); }

/* Batch test */
.batch-section { padding: 0.75rem 1.25rem; border-top: 1px solid var(--border); background: var(--surface); }
.batch-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 4px; margin-top: 6px; max-height: 80px; overflow-y: auto; }
.batch-result {
  font-family: var(--mono);
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 4px;
}
.batch-result.accept { background: var(--green-light); color: var(--green); border: 1px solid #bbf7d0; }
.batch-result.reject { background: var(--red-light); color: var(--red); border: 1px solid #fecaca; }
.batch-str { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.batch-sym { font-weight: 700; }
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <div class="topbar">
    <div class="logo">
      <span>DFA</span>
      <span class="logo-badge">UNIT 1</span>
    </div>
    <div class="topbar-divider"></div>
    <div class="machine-tabs" id="machine-tabs"></div>
    <div class="topbar-right">
      <span class="unit-badge">Theory of Computation</span>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-scroll">

        <div class="section-head">Machine</div>
        <div class="machine-card" id="machine-card">
          <div class="machine-name" id="m-name">—</div>
          <div class="machine-desc" id="m-desc">—</div>
          <div class="machine-meta" id="m-meta"></div>
        </div>

        <div class="section-head">States</div>
        <div class="states-list" id="states-list"></div>

        <div class="section-head">Transition Function δ</div>
        <div class="trans-table-wrap">
          <table class="trans-table">
            <thead>
              <tr><th>State</th><th>Symbol</th><th>→ Next</th></tr>
            </thead>
            <tbody id="trans-tbody"></tbody>
          </table>
        </div>

        <div class="section-head">Sample Inputs</div>
        <div class="sample-tests" id="sample-tests"></div>

      </div>

      <!-- Input tester -->
      <div class="input-area">
        <div class="input-label-row">
          <span class="input-label">Test Input</span>
          <span style="font-family:var(--mono);font-size:10px;color:var(--muted)" id="pos-display">pos: —</span>
        </div>
        <div class="input-row">
          <input class="str-input" id="str-input" placeholder="enter string…" maxlength="20" spellcheck="false">
          <button class="btn btn-primary" onclick="loadString()">Load</button>
        </div>
        <div class="tape-display" id="tape-display"></div>
        <div class="result-pill" id="result-pill"></div>
        <div class="ctrl-row" style="margin-top:8px">
          <button class="btn" id="btn-step" onclick="stepFwd()" disabled>Step →</button>
          <button class="btn btn-green" id="btn-run" onclick="toggleRun()" disabled>Run ▶</button>
          <button class="btn" onclick="resetSim()">Reset</button>
          <button class="btn" onclick="runAll()" style="margin-left:auto">Batch ⚡</button>
        </div>
        <div style="margin-top:6px">
          <label style="font-size:11px;color:var(--muted);font-family:var(--mono)">
            speed <input type="range" id="speed" min="1" max="10" value="5" style="width:70px;vertical-align:middle;margin-left:4px">
          </label>
        </div>
      </div>

      <!-- Batch results -->
      <div class="batch-section" id="batch-section" style="display:none">
        <div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2px">Batch Results</div>
        <div class="batch-grid" id="batch-grid"></div>
      </div>
    </div>

    <!-- Canvas area -->
    <div class="canvas-area">
      <div class="canvas-toolbar">
        <span class="canvas-title">State diagram — <span id="canvas-title-machine">—</span></span>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot start"></div>Start</div>
          <div class="legend-item"><div class="legend-dot accept"></div>Accept</div>
          <div class="legend-item"><div class="legend-dot dead"></div>Dead</div>
          <div class="legend-item"><div class="legend-dot current"></div>Current</div>
        </div>
      </div>
      <div class="canvas-wrap">
        <canvas id="dfa-canvas"></canvas>
        <div class="step-info" id="step-info">
          <div class="step-info-row"><span class="step-key">state</span><span class="step-val" id="si-state">—</span></div>
          <div class="step-info-row"><span class="step-key">reading</span><span class="step-val" id="si-reading">—</span></div>
          <div class="step-info-row"><span class="step-key">step</span><span class="step-val" id="si-step">0 / 0</span></div>
          <div class="step-info-row"><span class="step-key">status</span><span class="step-val" id="si-status">ready</span></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// MACHINE DEFINITIONS
// ═══════════════════════════════════════════════════════
const MACHINES = [
  {
    id: 'endswith1',
    name: 'Ends with 1',
    desc: 'Accepts binary strings that end with 1. Language: (0|1)*1',
    alphabet: ['0','1'],
    states: ['q0','q1'],
    start: 'q0',
    accept: ['q1'],
    dead: [],
    delta: {
      'q0,0': 'q0', 'q0,1': 'q1',
      'q1,0': 'q0', 'q1,1': 'q1',
    },
    stateRoles: { q0: 'start', q1: 'accept' },
    samples: { accept: ['1','01','101','111','0001'], reject: ['0','10','100','110','000'] },
    layout: { q0: [0.28, 0.5], q1: [0.72, 0.5] },
  },
  {
    id: 'div3',
    name: 'Divisible by 3',
    desc: 'Accepts binary representations of non-negative integers divisible by 3. The remainder mod 3 is tracked as state.',
    alphabet: ['0','1'],
    states: ['q0','q1','q2'],
    start: 'q0',
    accept: ['q0'],
    dead: [],
    delta: {
      'q0,0': 'q0', 'q0,1': 'q1',
      'q1,0': 'q2', 'q1,1': 'q0',
      'q2,0': 'q1', 'q2,1': 'q2',
    },
    stateRoles: { q0: 'start-accept', q1: 'normal', q2: 'normal' },
    samples: { accept: ['0','11','110','1001','1100'], reject: ['1','10','100','111','1010'] },
    layout: { q0: [0.2, 0.5], q1: [0.6, 0.28], q2: [0.6, 0.72] },
  },
  {
    id: 'startsa',
    name: 'Starts with "ab"',
    desc: 'Accepts strings over {a,b} that start with the substring "ab". Has a dead/trap state for invalid prefixes.',
    alphabet: ['a','b'],
    states: ['q0','q1','q2','qD'],
    start: 'q0',
    accept: ['q2'],
    dead: ['qD'],
    delta: {
      'q0,a': 'q1', 'q0,b': 'qD',
      'q1,a': 'qD', 'q1,b': 'q2',
      'q2,a': 'q2', 'q2,b': 'q2',
      'qD,a': 'qD', 'qD,b': 'qD',
    },
    stateRoles: { q0: 'start', q1: 'normal', q2: 'accept', qD: 'dead' },
    samples: { accept: ['ab','aba','abba','abab','abb'], reject: ['a','b','ba','bab','aab'] },
    layout: { q0: [0.15, 0.5], q1: [0.4, 0.5], q2: [0.65, 0.5], qD: [0.4, 0.82] },
  },
  {
    id: 'even01',
    name: 'Even 0s & 1s',
    desc: 'Accepts strings with an even number of 0s AND an even number of 1s. States encode (parity_0, parity_1).',
    alphabet: ['0','1'],
    states: ['q00','q10','q01','q11'],
    start: 'q00',
    accept: ['q00'],
    dead: [],
    delta: {
      'q00,0': 'q10', 'q00,1': 'q01',
      'q10,0': 'q00', 'q10,1': 'q11',
      'q01,0': 'q11', 'q01,1': 'q00',
      'q11,0': 'q01', 'q11,1': 'q10',
    },
    stateRoles: { q00: 'start-accept', q10: 'normal', q01: 'normal', q11: 'normal' },
    stateLabels: { q00: 'even,even', q10: 'odd,even', q01: 'even,odd', q11: 'odd,odd' },
    samples: { accept: ['','00','11','0011','1100','0101'], reject: ['0','1','01','10','001','110'] },
    layout: { q00: [0.28, 0.28], q10: [0.72, 0.28], q01: [0.28, 0.72], q11: [0.72, 0.72] },
  },
  {
    id: 'noaa',
    name: 'No consecutive a\'s',
    desc: 'Accepts strings over {a,b} that do not contain "aa" as a substring.',
    alphabet: ['a','b'],
    states: ['q0','q1','qD'],
    start: 'q0',
    accept: ['q0','q1'],
    dead: ['qD'],
    delta: {
      'q0,a': 'q1', 'q0,b': 'q0',
      'q1,a': 'qD', 'q1,b': 'q0',
      'qD,a': 'qD', 'qD,b': 'qD',
    },
    stateRoles: { q0: 'start-accept', q1: 'accept', qD: 'dead' },
    stateLabels: { q0: 'no prev a', q1: 'one a', qD: 'saw aa' },
    samples: { accept: ['','a','b','ab','ba','bab','aba'], reject: ['aa','aab','baa','aaa','bbaab'] },
    layout: { q0: [0.2, 0.5], q1: [0.55, 0.5], qD: [0.85, 0.5] },
  },
];

// ═══════════════════════════════════════════════════════
// GLOBAL STATE
// ═══════════════════════════════════════════════════════
let machine = MACHINES[0];
let simStr = [];
let simPos = -1;  // -1 = not started, 0..n = at char
let simState = '';
let simHalted = false;
let simRunning = false;
let simTimer = null;
let lastTransKey = '';

// Canvas animation
let canvasAnimState = {};  // { stateName: glowAmount }
let animFrame = null;
let activeState = '';
let prevState = '';

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init() {
  buildMachineTabs();
  selectMachine(0);
  window.addEventListener('resize', () => drawDFA());
  document.getElementById('str-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadString();
  });
}

function buildMachineTabs() {
  const el = document.getElementById('machine-tabs');
  el.innerHTML = '';
  MACHINES.forEach((m, i) => {
    const b = document.createElement('button');
    b.className = 'tab' + (i === 0 ? ' active' : '');
    b.textContent = m.name;
    b.id = 'tab-' + m.id;
    b.onclick = () => selectMachine(i);
    el.appendChild(b);
  });
}

function selectMachine(i) {
  machine = MACHINES[i];
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', j === i));
  buildSidebar();
  resetSim();
  document.getElementById('batch-section').style.display = 'none';
  document.getElementById('str-input').value = machine.samples.accept[0] || '';
  loadString();
}

// ═══════════════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════════════
function buildSidebar() {
  document.getElementById('m-name').textContent = machine.name;
  document.getElementById('m-desc').textContent = machine.desc;
  document.getElementById('canvas-title-machine').textContent = machine.name;

  const meta = document.getElementById('m-meta');
  meta.innerHTML = '';
  const addChip = (txt, cls='') => {
    const c = document.createElement('span');
    c.className = 'chip ' + cls;
    c.textContent = txt;
    meta.appendChild(c);
  };
  addChip('Σ = {' + machine.alphabet.join(', ') + '}', 'blue');
  addChip(`${machine.states.length} states`);
  addChip(`start: ${machine.start}`);
  addChip(`accept: {${machine.accept.join(', ')}}`, 'green');

  buildStatesList();
  buildTransTable();
  buildSamples();
}

function buildStatesList() {
  const el = document.getElementById('states-list');
  el.innerHTML = '';
  machine.states.forEach(s => {
    const row = document.createElement('div');
    row.className = 'state-row';
    row.id = 'srow-' + s;

    const role = machine.stateRoles[s] || 'normal';
    const isAccept = machine.accept.includes(s);

    const dot = document.createElement('div');
    dot.className = 'state-dot ' + role;
    row.appendChild(dot);

    const name = document.createElement('span');
    name.className = 'state-name';
    name.textContent = s;
    row.appendChild(name);

    const roleLabels = [];
    if (machine.start === s) roleLabels.push('start');
    if (isAccept) roleLabels.push('accept');
    if (machine.dead.includes(s)) roleLabels.push('dead/trap');
    if (machine.stateLabels && machine.stateLabels[s]) roleLabels.push(machine.stateLabels[s]);

    if (roleLabels.length) {
      const rl = document.createElement('span');
      rl.className = 'state-role';
      rl.textContent = roleLabels.join(' · ');
      row.appendChild(rl);
    }

    el.appendChild(row);
  });
}

function buildTransTable() {
  const tbody = document.getElementById('trans-tbody');
  tbody.innerHTML = '';
  let i = 0;
  machine.states.forEach(s => {
    machine.alphabet.forEach(sym => {
      const key = s + ',' + sym;
      const next = machine.delta[key] || '—';
      const tr = document.createElement('tr');
      tr.id = 'trow-' + key.replace(',', '-');
      const isAccept = machine.accept.includes(next);
      const isDead = machine.dead.includes(next);
      tr.innerHTML = `<td>${s}</td><td>${sym}</td><td class="${isAccept ? 'to-accept' : isDead ? 'to-dead' : ''}">${next}</td>`;
      tbody.appendChild(tr);
      i++;
    });
  });
}

function buildSamples() {
  const el = document.getElementById('sample-tests');
  el.innerHTML = '';
  machine.samples.accept.slice(0, 5).forEach(s => {
    const b = document.createElement('span');
    b.className = 'sample-test accept';
    b.textContent = s === '' ? 'ε' : s;
    b.title = 'Accept';
    b.onclick = () => { document.getElementById('str-input').value = s; loadString(); };
    el.appendChild(b);
  });
  machine.samples.reject.slice(0, 5).forEach(s => {
    const b = document.createElement('span');
    b.className = 'sample-test reject';
    b.textContent = s;
    b.title = 'Reject';
    b.onclick = () => { document.getElementById('str-input').value = s; loadString(); };
    el.appendChild(b);
  });
}

// ═══════════════════════════════════════════════════════
// SIMULATION
// ═══════════════════════════════════════════════════════
function loadString() {
  stopRun();
  const raw = document.getElementById('str-input').value;
  const valid = raw.split('').filter(c => machine.alphabet.includes(c));
  document.getElementById('str-input').value = valid.join('');
  simStr = valid;
  simPos = 0;
  simState = machine.start;
  simHalted = false;
  lastTransKey = '';

  document.getElementById('result-pill').className = 'result-pill';
  document.getElementById('result-pill').textContent = '';
  document.getElementById('btn-step').disabled = false;
  document.getElementById('btn-run').disabled = false;

  renderTape();
  updateStepInfo();
  highlightTransRow('');
  setActiveState(machine.start);
  document.getElementById('batch-section').style.display = 'none';
}

function resetSim() {
  stopRun();
  simStr = [];
  simPos = 0;
  simState = machine.start;
  simHalted = false;
  lastTransKey = '';
  document.getElementById('tape-display').innerHTML = '';
  document.getElementById('result-pill').className = 'result-pill';
  document.getElementById('result-pill').textContent = '';
  document.getElementById('btn-step').disabled = true;
  document.getElementById('btn-run').disabled = true;
  document.getElementById('pos-display').textContent = 'pos: —';
  updateStepInfo();
  highlightTransRow('');
  setActiveState(machine.start);
}

function stepFwd() {
  if (simHalted) return;

  if (simPos >= simStr.length) {
    // Finished reading — check accept
    simHalted = true;
    const accepted = machine.accept.includes(simState);
    const pill = document.getElementById('result-pill');
    pill.className = 'result-pill ' + (accepted ? 'accept' : 'reject');
    pill.textContent = accepted
      ? `✓ ACCEPTED — "${simStr.join('')||'ε'}" ∈ L`
      : `✗ REJECTED — "${simStr.join('')||'ε'}" ∉ L`;
    document.getElementById('btn-step').disabled = true;
    document.getElementById('btn-run').disabled = true;
    markTapeFinal(accepted);
    updateStepInfo(true);
    highlightStateRow(simState, accepted ? 'accept-current' : 'reject-current');
    return;
  }

  const sym = simStr[simPos];
  const key = simState + ',' + sym;
  const next = machine.delta[key];

  if (!next) {
    simHalted = true;
    document.getElementById('result-pill').className = 'result-pill reject';
    document.getElementById('result-pill').textContent = `✗ REJECTED — no transition δ(${simState}, ${sym})`;
    document.getElementById('btn-step').disabled = true;
    document.getElementById('btn-run').disabled = true;
    return;
  }

  lastTransKey = key;
  highlightTransRow(key);
  prevState = simState;
  simState = next;
  simPos++;
  setActiveState(simState);
  renderTape();
  updateStepInfo();
  document.getElementById('pos-display').textContent = `pos: ${simPos} / ${simStr.length}`;
  highlightStateRow(simState, '');
}

function toggleRun() {
  if (simRunning) stopRun();
  else startRun();
}

function startRun() {
  if (simHalted || simPos > simStr.length) return;
  simRunning = true;
  document.getElementById('btn-run').textContent = 'Pause ⏸';
  document.getElementById('btn-run').className = 'btn';
  document.getElementById('btn-run').style.background = '#dc2626';
  document.getElementById('btn-run').style.borderColor = '#dc2626';
  document.getElementById('btn-run').style.color = '#fff';
  scheduleStep();
}

function stopRun() {
  simRunning = false;
  clearTimeout(simTimer);
  const rb = document.getElementById('btn-run');
  rb.textContent = 'Run ▶';
  rb.style.background = '';
  rb.style.borderColor = '';
  rb.style.color = '';
  rb.className = 'btn btn-green';
}

function scheduleStep() {
  if (!simRunning || simHalted) { stopRun(); return; }
  const spd = parseInt(document.getElementById('speed').value);
  simTimer = setTimeout(() => {
    stepFwd();
    if (!simHalted) scheduleStep();
    else stopRun();
  }, Math.round(1000 - spd * 85));
}

// ═══════════════════════════════════════════════════════
// BATCH TEST
// ═══════════════════════════════════════════════════════
function runAll() {
  stopRun();
  const tests = [...machine.samples.accept, ...machine.samples.reject];
  const grid = document.getElementById('batch-grid');
  grid.innerHTML = '';
  tests.forEach(s => {
    const result = simulate(s);
    const div = document.createElement('div');
    div.className = 'batch-result ' + result;
    div.innerHTML = `<span class="batch-str">${s===''?'ε':s}</span><span class="batch-sym">${result==='accept'?'✓':'✗'}</span>`;
    div.title = (result==='accept'?'ACCEPT: ':'REJECT: ') + (s||'ε');
    div.onclick = () => { document.getElementById('str-input').value = s; loadString(); };
    grid.appendChild(div);
  });
  document.getElementById('batch-section').style.display = 'block';
}

function simulate(str) {
  let state = machine.start;
  for (const c of str) {
    const next = machine.delta[state + ',' + c];
    if (!next) return 'reject';
    state = next;
  }
  return machine.accept.includes(state) ? 'accept' : 'reject';
}

// ═══════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════
function renderTape() {
  const el = document.getElementById('tape-display');
  el.innerHTML = '';
  if (simStr.length === 0) {
    const eps = document.createElement('div');
    eps.className = 'tape-char';
    eps.style.fontSize = '12px';
    eps.textContent = 'ε';
    el.appendChild(eps);
    return;
  }
  simStr.forEach((c, i) => {
    const div = document.createElement('div');
    const isPast = i < simPos;
    const isCur = i === simPos;
    div.className = 'tape-char' + (isPast ? ' read' : '') + (isCur ? ' current-pos' : '');
    div.textContent = c;
    el.appendChild(div);
  });
  // End marker
  if (simPos >= simStr.length) {
    const end = document.createElement('div');
    end.className = 'tape-char';
    end.style.fontSize = '10px';
    end.style.color = 'var(--muted)';
    end.textContent = '⊣';
    el.appendChild(end);
  }
}

function markTapeFinal(accepted) {
  const cells = document.querySelectorAll('.tape-char');
  cells.forEach(c => {
    c.classList.remove('current-pos', 'read');
    c.classList.add(accepted ? 'done-accept' : 'done-reject');
  });
}

function updateStepInfo(halted) {
  document.getElementById('si-state').textContent = simState || machine.start;
  const cur = simStr[simPos] ?? (simPos >= simStr.length ? '⊣' : '—');
  document.getElementById('si-reading').textContent = cur;
  document.getElementById('si-step').textContent = `${Math.min(simPos, simStr.length)} / ${simStr.length}`;

  const statusEl = document.getElementById('si-status');
  if (!simStr.length && simPos === 0) { statusEl.textContent = 'ready'; statusEl.className = 'step-val'; }
  else if (halted) {
    const ok = machine.accept.includes(simState);
    statusEl.textContent = ok ? 'accepted ✓' : 'rejected ✗';
    statusEl.className = 'step-val ' + (ok ? 'accept' : 'reject');
  } else {
    statusEl.textContent = 'running';
    statusEl.className = 'step-val';
  }
}

function highlightTransRow(key) {
  document.querySelectorAll('.trans-table tr.active-trans').forEach(r => r.classList.remove('active-trans'));
  if (!key) return;
  const id = 'trow-' + key.replace(',', '-');
  const tr = document.getElementById(id);
  if (tr) { tr.classList.add('active-trans'); tr.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
}

function highlightStateRow(s, extra) {
  document.querySelectorAll('.state-row').forEach(r => {
    r.classList.remove('current', 'accept-current', 'reject-current');
  });
  const row = document.getElementById('srow-' + s);
  if (row) { row.classList.add('current'); if (extra) row.classList.add(extra); }
}

// ═══════════════════════════════════════════════════════
// CANVAS — DFA DIAGRAM
// ═══════════════════════════════════════════════════════
const R = 32; // node radius
const COLORS = {
  node: '#ffffff',
  nodeBorder: '#d0d0c8',
  nodeText: '#1c1c1a',
  start: '#d97706',
  accept: '#16a34a',
  dead: '#dc2626',
  current: '#2563eb',
  arrow: '#888882',
  arrowActive: '#2563eb',
  selfLoop: '#6b7280',
  bg: '#fafaf8',
};

let statePositions = {};  // { stateName: {x, y} }
let glowStates = {};      // { stateName: intensity 0..1 }
let prevActiveState = '';
let curActiveState = '';

function setActiveState(s) {
  prevActiveState = curActiveState;
  curActiveState = s;
  drawDFA();
}

function getCanvas() {
  return document.getElementById('dfa-canvas');
}

function getCtx() {
  return getCanvas().getContext('2d');
}

function resizeCanvas() {
  const canvas = getCanvas();
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  canvas.style.width = wrap.clientWidth + 'px';
  canvas.style.height = wrap.clientHeight + 'px';
}

function computePositions() {
  const canvas = getCanvas();
  const W = canvas.width / devicePixelRatio;
  const H = canvas.height / devicePixelRatio;
  statePositions = {};
  machine.states.forEach(s => {
    const [rx, ry] = machine.layout[s] || [0.5, 0.5];
    statePositions[s] = { x: rx * W, y: ry * H };
  });
}

function drawDFA() {
  resizeCanvas();
  computePositions();
  const canvas = getCanvas();
  const ctx = getCtx();
  const W = canvas.width;
  const H = canvas.height;
  const dpr = devicePixelRatio;
  ctx.clearRect(0, 0, W, H);
  ctx.scale(dpr, dpr);

  const w = W / dpr, h = H / dpr;

  // Background
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, w, h);

  // Draw transitions
  drawTransitions(ctx, w, h);

  // Draw states on top
  machine.states.forEach(s => drawState(ctx, s));

  ctx.setTransform(1, 0, 0, 1, 0, 0);
}

function drawTransitions(ctx, w, h) {
  // Group transitions by state pair to handle multiple labels
  const pairs = {};
  Object.entries(machine.delta).forEach(([key, next]) => {
    const [from, sym] = key.split(',');
    const pkey = from + '->' + next;
    if (!pairs[pkey]) pairs[pkey] = { from, next, syms: [] };
    pairs[pkey].syms.push(sym);
  });

  Object.values(pairs).forEach(({ from, next, syms }) => {
    const isActive = lastTransKey && machine.delta[lastTransKey] === next && lastTransKey.split(',')[0] === from;
    const label = syms.join(', ');
    if (from === next) drawSelfLoop(ctx, from, label, isActive);
    else drawArrow(ctx, from, next, label, isActive, pairs[next + '->' + from]);
  });
}

function drawArrow(ctx, from, to, label, isActive, reverse) {
  const fp = statePositions[from];
  const tp = statePositions[to];
  if (!fp || !tp) return;

  const dx = tp.x - fp.x, dy = tp.y - fp.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const ux = dx/dist, uy = dy/dist;
  const px = -uy, py = ux; // perp

  const bend = reverse ? 28 : 0;

  const sx = fp.x + ux*R + px*bend;
  const sy = fp.y + uy*R + py*bend;
  const ex = tp.x - ux*R + px*bend;
  const ey = tp.y - uy*R + py*bend;

  const mx = (sx + ex) / 2 + px * (bend ? 20 : 18);
  const my = (sy + ey) / 2 + py * (bend ? 20 : 18);

  ctx.beginPath();
  ctx.moveTo(sx, sy);
  if (bend) ctx.quadraticCurveTo(mx, my, ex, ey);
  else ctx.quadraticCurveTo(mx, my, ex, ey);

  ctx.strokeStyle = isActive ? COLORS.arrowActive : COLORS.arrow;
  ctx.lineWidth = isActive ? 2.5 : 1.5;
  ctx.setLineDash([]);
  ctx.stroke();

  // Arrowhead
  drawArrowhead(ctx, ex, ey, Math.atan2(ey - my, ex - mx), isActive ? COLORS.arrowActive : COLORS.arrow);

  // Label
  const lx = (sx + ex) / 2 + px * (bend ? 36 : 28);
  const ly = (sy + ey) / 2 + py * (bend ? 36 : 28);
  drawEdgeLabel(ctx, label, lx, ly, isActive);
}

function drawSelfLoop(ctx, state, label, isActive) {
  const p = statePositions[state];
  if (!p) return;

  const loopR = 22;
  const angle = -Math.PI / 2;
  const cx = p.x + Math.cos(angle) * (R + loopR);
  const cy = p.y + Math.sin(angle) * (R + loopR);

  ctx.beginPath();
  ctx.arc(cx, cy, loopR, 0, Math.PI * 2);
  ctx.strokeStyle = isActive ? COLORS.arrowActive : COLORS.selfLoop;
  ctx.lineWidth = isActive ? 2.5 : 1.5;
  ctx.stroke();

  // arrowhead on circle
  const arrAngle = angle + Math.PI / 2 + 0.3;
  const ax = p.x + Math.cos(angle) * R;
  const ay = p.y + Math.sin(angle) * R;
  drawArrowhead(ctx, ax, ay, arrAngle + Math.PI, isActive ? COLORS.arrowActive : COLORS.selfLoop);

  // label above loop
  drawEdgeLabel(ctx, label, cx, cy - loopR - 10, isActive);
}

function drawArrowhead(ctx, x, y, angle, color) {
  const size = 9;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-size, -size/2.5);
  ctx.lineTo(-size, size/2.5);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function drawEdgeLabel(ctx, label, x, y, isActive) {
  const pad = 5;
  ctx.font = `500 11px IBM Plex Mono, monospace`;
  const tw = ctx.measureText(label).width;
  ctx.fillStyle = isActive ? '#eff6ff' : '#fafaf8';
  ctx.beginPath();
  ctx.roundRect(x - tw/2 - pad, y - 9, tw + pad*2, 18, 3);
  ctx.fill();
  ctx.fillStyle = isActive ? COLORS.arrowActive : COLORS.arrow;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(label, x, y);
}

function drawState(ctx, s) {
  const p = statePositions[s];
  if (!p) return;

  const isCurrent = s === curActiveState;
  const isAccept = machine.accept.includes(s);
  const isDead = machine.dead.includes(s);
  const isStart = machine.start === s;
  const role = machine.stateRoles[s] || 'normal';

  // Shadow for current
  if (isCurrent) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, R + 6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(37,99,235,0.12)';
    ctx.fill();
  }

  // Outer ring for accept states (double circle)
  if (isAccept) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, R + 5, 0, Math.PI * 2);
    ctx.strokeStyle = isCurrent ? COLORS.current : COLORS.accept;
    ctx.lineWidth = isCurrent ? 2.5 : 2;
    ctx.setLineDash([]);
    ctx.stroke();
  }

  // Main circle
  ctx.beginPath();
  ctx.arc(p.x, p.y, R, 0, Math.PI * 2);

  if (isCurrent) {
    ctx.fillStyle = '#eff6ff';
  } else if (isDead) {
    ctx.fillStyle = '#fef2f2';
  } else if (isAccept) {
    ctx.fillStyle = '#f0fdf4';
  } else {
    ctx.fillStyle = COLORS.node;
  }
  ctx.fill();

  ctx.strokeStyle = isCurrent ? COLORS.current
    : isDead ? COLORS.dead
    : isAccept ? COLORS.accept
    : isStart ? COLORS.start
    : COLORS.nodeBorder;
  ctx.lineWidth = isCurrent ? 2.5 : isAccept || isDead ? 2 : 1.5;
  ctx.setLineDash([]);
  ctx.stroke();

  // State name
  ctx.font = `500 13px IBM Plex Mono, monospace`;
  ctx.fillStyle = isCurrent ? COLORS.current
    : isDead ? COLORS.dead
    : COLORS.nodeText;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(s, p.x, p.y);

  // Sub-label
  if (machine.stateLabels && machine.stateLabels[s]) {
    ctx.font = `400 9px IBM Plex Mono, monospace`;
    ctx.fillStyle = isCurrent ? COLORS.current : '#aaa';
    ctx.fillText(machine.stateLabels[s], p.x, p.y + 14);
  }

  // Start arrow
  if (isStart) {
    const arr = 28;
    const ax = p.x - R - 4;
    const ay = p.y;
    ctx.beginPath();
    ctx.moveTo(ax - arr, ay);
    ctx.lineTo(ax, ay);
    ctx.strokeStyle = COLORS.start;
    ctx.lineWidth = 2;
    ctx.setLineDash([]);
    ctx.stroke();
    drawArrowhead(ctx, ax, ay, 0, COLORS.start);
  }
}

// ═══════════════════════════════════════════════════════
// KICK OFF
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  init();
  setTimeout(drawDFA, 50);
});
